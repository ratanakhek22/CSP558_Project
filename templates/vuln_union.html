<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>UNION Injection - Vulnerable</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>
    <nav>
        <a href="{{ url_for('index') }}">Go to Routes</a>
    </nav>
 
    <main>
        <h1>UNION Injection</h1>
        <h2>Vulnerable</h2>
        <form action="{{ url_for('vuln_union') }}" method="POST">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required />
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required />
            <button type="submit">Submit</button>
        </form>
 
        {% if result %}
            <p style="margin-top: 1.5rem; font-size: 0.9rem; color: #334155;">Query returned:</p>
            <pre style="background: #f1f5f9; border-radius: 8px; padding: 1rem; font-size: 0.88rem; text-align: left; overflow-x: auto; color: #0f172a;">{{ result }}</pre>
        {% endif %}
    </main>
</body>
</html>
